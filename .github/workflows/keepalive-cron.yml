name: Keepalive Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger keepalive worker
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_URL"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error \
            --max-time 120 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/keepalive/cron"
